# =============================================================================
# recon.conf — recon.sh 預設參數設定
# =============================================================================
# 由 recon.sh 自動載入。CLI 參數會覆蓋這裡的設定。
# 變更後不需重啟, 下次執行 recon.sh 即生效。
# =============================================================================

# --- Profile / 強度 -----------------------------------------------------------
# RECON_PROFILE controls live-bounty defaults. Use live-low-speed for scoped
# bounty lanes; use lab-aggressive only on disposable/recoverable lab targets.
RECON_PROFILE="live-low-speed"   # live-low-speed / lab-aggressive

# --- 強度 (quick / normal / aggressive / full) -------------------------------
DEFAULT_INTENSITY="normal"

# --- Port Scan ---------------------------------------------------------------
# naabu top ports 數量 (quick=100, normal=1000, aggressive=full)
NAABU_TOP_PORTS_QUICK=100
NAABU_TOP_PORTS_NORMAL=1000
NAABU_RATE=50                # live-low-speed default; raise only for lab-aggressive
NAABU_TIMEOUT=1000           # ms

# --- Nmap 服務指紋 -----------------------------------------------------------
NMAP_SCRIPTS="default,vuln,banner"
NMAP_TIMING="-T4"            # T0=慢隱蔽, T5=最快
NMAP_HOST_TIMEOUT="10m"

# --- 子網域枚舉 --------------------------------------------------------------
SUBFINDER_TIMEOUT=30
SUBFINDER_THREADS=20
USE_CRT_SH=true              # 用 crt.sh 證書透明度補充子網域

# --- HTTPX Web 探測 ----------------------------------------------------------
HTTPX_THREADS=5
HTTPX_TIMEOUT=10
HTTPX_PROBES="-title -tech-detect -status-code -content-length -web-server -ip -cname"

# --- Feroxbuster 目錄爆破 ---------------------------------------------------
FEROX_WORDLIST="/usr/share/seclists/Discovery/Web-Content/raft-medium-directories.txt"
FEROX_WORDLIST_FALLBACK="/usr/share/wordlists/dirb/common.txt"
FEROX_THREADS=2
FEROX_DEPTH=2
FEROX_EXTENSIONS="php,html,txt,bak,old,zip,js,json,xml,conf"
FEROX_STATUS_CODES="200,204,301,302,307,401,403,500"

# --- Nuclei 漏洞掃描 ---------------------------------------------------------
NUCLEI_SEVERITY_NORMAL="info,low,medium"
NUCLEI_SEVERITY_AGGRESSIVE="info,low,medium,high,critical"
NUCLEI_RATE_LIMIT=10
NUCLEI_CONCURRENCY=3
NUCLEI_TIMEOUT=10
NUCLEI_EXCLUDE_TAGS="dos,intrusive,fuzz"          # 預設排除可能造成損害的模板
NUCLEI_EXCLUDE_TAGS_FULL=""                        # --full 模式全開

# --- 代理 --------------------------------------------------------------------
DEFAULT_PROXY=""             # 例如 "socks5://127.0.0.1:9050" 走 Tor
BURP_PROXY="http://127.0.0.1:8080"
BURP_CA_CERT="$HOME/.config/recon/burp_ca.crt"    # 若 Burp 有自簽憑證放這

# --- 通知 --------------------------------------------------------------------
SLACK_WEBHOOK=""             # https://hooks.slack.com/services/...
GENERIC_WEBHOOK=""           # 任意接收 JSON POST 的 URL
NOTIFY_ON_FINDING_SEVERITY="high,critical"   # 只在這些等級的 finding 才通知

# --- 並發控制 ----------------------------------------------------------------
MAX_PARALLEL_HOSTS=5         # 同時掃幾個 host (批次模式用)

# --- Live bounty caps ---------------------------------------------------------
LIVE_MAX_REQUESTS_PER_HOST_PER_RUN=50
LIVE_MAX_STATE_CHANGES_PER_RUN=5
LIVE_MAX_CHAIN_STEPS=3
LIVE_REQUIRE_TECHNIQUE_ALLOW=true
LIVE_ALLOW_FULL_PROFILE=false  # --full belongs to lab-aggressive or explicit lane approval

# --- 路徑 (通常不用改) -------------------------------------------------------
SCANS_DIR="${HACKLAB:-$HOME/projects/cybersec}/scans"
LOGS_DIR="${HACKLAB:-$HOME/projects/cybersec}/logs"
SCOPE_FILE="${HACKLAB:-$HOME/projects/cybersec}/config/scope.txt"

# --- 安全旗標 ----------------------------------------------------------------
REQUIRE_SCOPE_CHECK=true     # must remain true; recon.sh refuses false as a hard error
AUDIT_LOG=true               # 記錄每次執行的 timestamp+target+user 到 audit.log
